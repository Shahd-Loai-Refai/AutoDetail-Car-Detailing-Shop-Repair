<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDetail - Car-Detailing, Shop & Repair</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/general/logo-white.png">
    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/output.css">
</head>

<body>
    <div class="Topnav_section bg-black/50">
        <div class="container mx-auto hidden lg:flex justify-between items-center">
            <div class="py-[6px]">
                <a href="#index.html" class="flex gap-[10px]">
                    <img src="/assets/img/general/bell.svg" alt="Avatar" class="size-[20px]">
                    <span>GetGet 50% Discount for AutoDetail New Member</span>
                </a>
            </div>
            <div class="flex">
                <a href="#index.html" class="flex gap-[10px] px-[48px]">
                    <img src="./assets/img/general/phone.svg" alt="Avatar" class="size-[20px]">
                    <span>Call us: +1 800 987 654</span>
                </a>
                <a href="#index.html" class="flex gap-[10px]">
                    <img src="./assets/img/general/envelope.svg" alt="Avatar" class="size-[20px]">
                    <span>Message us: support@autodetail.com</span>
                </a>
            </div>
        </div>
    </div>
    <header class="sticky top-0 py-2 z-[1] bg-black lg:bg-black/40 lg:py-0">
        <div class="container mx-auto flex justify-between items-center space-x-[20px] px-[20px] sm:px-[0]">
            <div>
                <img src="./assets/img/general/logo-white.webp" alt="logo">
            </div>
            <div>
                <ul class="hidden lg:flex gap-[30px] p-[25px]">
                    <li>
                        <a class="flex gap-[5px]" href="#index.html">Home <i
                                class="fa-solid fa-angle-down fa-2xs opacity-[0.75px] pt-2.5"
                                style="color: rgba(255, 255, 255, .75);"></i></a>
                    </li>
                    <li>
                        <a class="flex gap-[5px]" href="#">Services <i
                                class="fa-solid fa-angle-down fa-2xs opacity-[0.75px] pt-2.5"
                                style="color: rgba(255, 255, 255, .75);"></i></a>
                    </li>
                    <li>
                        <a class="flex gap-[5px]" href="#">Pages <i
                                class="fa-solid fa-angle-down fa-2xs opacity-[0.75px] pt-2.5"
                                style="color: rgba(255, 255, 255, .75);"></i></a>
                    </li>
                    <li>
                        <a href="#">Shop</a>
                    </li>
                    <li>
                        <a class="flex gap-[5px]" href="#">Gallery <i
                                class="fa-solid fa-angle-down fa-2xs opacity-[0.75px] pt-2.5"
                                style="color: rgba(255, 255, 255, .75);"></i></a>
                    </li>
                    <li>
                        <a href="#">Blog</a>
                    </li>
                    <li>
                        <a class="flex gap-[5px]" href="#">Workshop<i
                                class="fa-solid fa-angle-down fa-2xs opacity-[0.75px] pt-2.5"
                                style="color: rgba(255, 255, 255, .75);"></i></a>
                    </li>
                </ul>
            </div>
            <div class="flex">
                <button class="group bg-[#e9021e] py-2 px-4 rounded hidden sm:block"><span class="text-white">Make
                        Appointment</span></button>
                <button><i class="fa-solid fa-bars-staggered fa-xl px-[10px]"
                        style="color: rgb(255, 255, 255);"></i></button>
            </div>
    </header>
    <section class="Hero_section relative h-screen flex flex-col justify-end items-center text-center">
        <video loop autoplay muted playsinline webkit-playsinline tabindex="-1" aria-hidden="true"
            style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;"
            class="opacity-50">
            <source src="./assets/img/general/_1.mp4" type="video/mp4">
        </video>
        <div class="Hero_section_content">
            <h1 class="text-[60px] md:text-[150px]">LUXURY DETAIL</h1>
            <p class="text-[12px] md:text-[16px] pb-[30px] [color:rgba(255,255,255,0.65)] ">AutoDetail offers efficient reliable
                detailing that restores<br> shine and preserves your vehicle.</p>
            <button class="group border-1 py-2 px-4 rounded text-white mb-[50px]">Make Appointment</button>
        </div>
    </section>
    <section class="Logos_section">
        <div class="flex justify-center">
            <img src="./assets/img/general/carIcon8.webp " class="w-[180px] h-[180px] p-[50px] hidden xl:block" alt="logo">
            <img src="./assets/img/general/carIcon2.webp " class="w-[160px] h-[160px] p-[50px] hidden lg:block xl:w-[180px] xl:h-[180px]" alt="logo">
            <img src="./assets/img/general/carIcon3.webp " class="w-[160px] h-[160px] p-[50px] hidden md:block xl:w-[180px] xl:h-[180px]" alt="logo">
            <img src="./assets/img/general/carIcon4.webp " class="w-[160px] h-[160px] p-[50px] hidden sm:block xl:w-[180px] xl:h-[180px]" alt="logo">
            <img src="./assets/img/general/carIcon5.webp " class="w-[100px] h-[100px] p-[20px] sm:p-[50px] sm:w-[160px] sm:h-[160px] xl:w-[180px] xl:h-[180px]" alt="logo">
            <img src="./assets/img/general/carIcon6.webp " class="w-[100px] h-[100px] p-[20px] sm:p-[50px] sm:w-[160px] sm:h-[160px] xl:w-[180px] xl:h-[180px]" alt="logo">
            <img src="./assets/img/general/carIcon7.webp " class="w-[100px] h-[100px] p-[20px] sm:p-[50px] sm:w-[160px] sm:h-[160px] xl:w-[180px] xl:h-[180px]" alt="logo">
        </div
    </section>

</body>

</html>
